<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Quiz sobre Guilherme</title>
</head>
<body class="roboto-mono">
    <header>
        <h1>Quiz sobre Guilherme</h1>
        <p>Você conhece Guilherme mesmo? Descubra agora neste quiz</p>
    </header>

    <div class="counter-container">
        <p class="counter disable">0%</p>
    </div>

    <form>
            <div id="question-one" class="question-container" >
                <h2 class="question">Qual o filme favorito de Guilherme?</h2>
                <div class="answer">
                    <input type="radio" id="A" name="question-one" value="A" checked>
                    <label for="A">Guardiões da Galaxia</label>
                </div>
                <div class="answer">
                    <input type="radio" id="B" name="question-one" value="B">
                    <label for="B">Homem Aranha: Atravez do Aranhaverso</label>
                </div>
                <div class="answer">
                    <input type="radio" id="C" name="question-one" value="C">
                    <label for="C">Super Heroi: O Filme</label>
                </div>
                <div class="answer">
                    <input type="radio" id="D" name="question-one" value="D">
                    <label for="D">Duna</label>
                </div>
                <div class="answer">
                    <input type="radio" id="E" name="question-one" value="E">
                    <label for="E">Kung Fu Panda 2</label>
                </div>
            </div>

            <div id="question-two" class="question-container">
                <h2 class="question">Qual o estilo de musica favorito de Guilherme?</h2>
                <div class="answer">
                    <input type="radio" id="A" name="question-two" value="A" checked>
                    <label for="A">Rap de anime </label>
                </div>
                <div class="answer">
                    <input type="radio" id="B" name="question-two" value="B">
                    <label for="B">Rock</label>
                </div>
                <div class="answer">
                    <input type="radio" id="C" name="question-two" value="C">
                    <label for="C">MPB </label>
                </div>
                <div class="answer">
                    <input type="radio" id="D" name="question-two" value="D">
                    <label for="D">K-Pop</label>
                </div>
                <div class="answer">
                    <input type="radio" id="E" name="question-two" value="E">
                    <label for="E">Phonk</label>
                </div>
            </div>

            <div id="question-three" class="question-container">
                <h2 class="question">Quem Guilherme ama mais?</h2>
                <div class="answer">
                    <input type="radio" id="A" name="question-three" value="A" checked>
                    <label for="A">Harry Kane</label>
                </div>
                <div class="answer">
                    <input type="radio" id="B" name="question-three" value="B">
                    <label for="B">Timothée Chalamet</label>
                </div>
                <div class="answer">
                    <input type="radio" id="C" name="question-three" value="C">
                    <label for="C">Lara Shay</label>
                </div>
                <div class="answer">
                    <input type="radio" id="D" name="question-three" value="D">
                    <label for="D">Cristiano Ronaldo</label>
                </div>
                <div class="answer">
                    <input type="radio" id="E" name="question-three" value="E">
                    <label for="E">Cellbit</label>
                </div>
            </div>

            <div id="question-four" class="question-container">
                <h2 class="question">Qual o jogo favorito de Guilherme?</h2>
                <div class="answer">
                    <input type="radio" id="A" name="question-four" value="A" checked>
                    <label for="A">Hollow Knight</label>
                </div>
                <div class="answer">
                    <input type="radio" id="B" name="question-four" value="B">
                    <label for="B">Pokemon Fire Red</label>
                </div>
                <div class="answer">
                    <input type="radio" id="C" name="question-four" value="C">
                    <label for="C">Clair Obscure: Expedition 33</label>
                </div>
                <div class="answer">
                    <input type="radio" id="D" name="question-four" value="D">
                    <label for="D">Subnautica</label>
                </div>
                <div class="answer">
                    <input type="radio" id="E" name="question-four" value="E">
                    <label for="E">Rocket League</label>
                </div>
            </div>

            <div id="question-five" class="question-container">
                <h2 class="question">Qual o anime favorito de Guilherme?</h2>
                <div class="answer">
                    <input type="radio" id="A" name="question-five" value="A" checked>
                    <label for="A">Blue Lock</label>
                </div>
                <div class="answer">
                    <input type="radio" id="B" name="question-five" value="B">
                    <label for="B">One Piece</label>
                </div>
                <div class="answer">
                    <input type="radio" id="C" name="question-five" value="C">
                    <label for="C">HunterXHunter</label>
                </div>
                <div class="answer">
                    <input type="radio" id="D" name="question-five" value="D">
                    <label for="D">Death Note</label>
                </div>
                <div class="answer">
                    <input type="radio" id="E" name="question-five" value="E">
                    <label for="E">Summer Time Rendering (Ilha das Sombras)</label>
                </div>
            </div>

        <button class="roboto-mono">Enviar</button>
    </form>
    <script src="app.js"></script>
</body>

</html>
